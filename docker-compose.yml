services:
  db:
    image: postgres:16-alpine
    container_name: guestbook_db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guestbook_web
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://app_user:app_password@db:5432/app_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
