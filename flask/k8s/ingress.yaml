apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guestbook-web
  namespace: guestbook
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  tls:
    - hosts:
        - guestbook.example.com
      secretName: guestbook-tls
  rules:
    - host: guestbook.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: guestbook-web
                port:
                  number: 80
