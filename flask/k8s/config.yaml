apiVersion: v1
kind: ConfigMap
metadata:
  name: guestbook-app-config
  namespace: guestbook
data:
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: app_db
  LOG_LEVEL: INFO
---
apiVersion: v1
kind: Secret
metadata:
  name: guestbook-db-secret
  namespace: guestbook
type: Opaque
stringData:
  DATABASE_USER: app_user
  DATABASE_PASSWORD: change-me
