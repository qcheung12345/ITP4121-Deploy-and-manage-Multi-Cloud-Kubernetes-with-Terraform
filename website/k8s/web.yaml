apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-web
  namespace: guestbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook-web
  template:
    metadata:
      labels:
        app: guestbook-web
    spec:
      imagePullSecrets:
        - name: acr-auth
      containers:
        - name: web
          image: itp4121multicloud.azurecr.io/guestbook-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: AUTO_INIT_DB
              value: "true"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: guestbook-app-secret
                  key: SECRET_KEY
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: guestbook-app-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: guestbook-app-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: guestbook-app-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: guestbook-db-secret
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guestbook-db-secret
                  key: DATABASE_PASSWORD
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: guestbook-app-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 25
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: guestbook-web
  namespace: guestbook
spec:
  selector:
    app: guestbook-web
  ports:
    - port: 80
      targetPort: 5000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: guestbook-web
  namespace: guestbook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: guestbook-web
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70